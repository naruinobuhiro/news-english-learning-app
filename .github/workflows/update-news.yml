name: Update News and Deploy

on:
  schedule:
    # 毎朝7:00 JST (22:00 UTC)
    - cron: '0 22 * * *'
  workflow_dispatch: # 手動実行用

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install

      # Phase 1: ニュース取得（API不使用・RSSのみ）
      - name: Fetch News (RSS only)
        run: node scripts/fetch-news.mjs

      # Phase 2: 翻訳（Gemini API・1件ずつ5秒間隔）
      - name: Translate News (Gemini API)
        run: node scripts/translate-news.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/archive.json public/data/raw-news.json
          git commit -m "chore: auto update news" || echo "No changes to commit"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build with Next.js
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
